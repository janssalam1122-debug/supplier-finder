<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>بحث الموردين الأوروبيين</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0B;color:#F0F0F2;font-family:'IBM Plex Sans Arabic',sans-serif;min-height:100vh;direction:rtl;padding:2rem}
h1{font-size:28px;font-weight:600;margin-bottom:6px}
h1 span{color:#4F8EF7}
.sub{font-size:14px;color:#9090A0;margin-bottom:1.5rem}
.search-row{display:flex;gap:10px;margin-bottom:1rem}
.search-row input{flex:1;padding:12px 16px;background:#111113;border:1px solid #3A3A42;border-radius:8px;font-size:15px;color:#F0F0F2;font-family:inherit;outline:none}
.search-row input:focus{border-color:#4F8EF7}
.search-row button{padding:12px 24px;background:#4F8EF7;border:none;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.search-row button:disabled{background:#2A2A30;color:#5A5A68;cursor:not-allowed}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.tag{padding:5px 13px;border:1px solid #2A2A30;border-radius:20px;font-size:12px;color:#9090A0;cursor:pointer;background:transparent}
.tag:hover{border-color:#3A3A42;color:#F0F0F2}
.status{background:#111113;border:1px solid #2A2A30;border-radius:10px;padding:1rem;margin-bottom:1rem;font-size:13px;color:#9090A0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.card{background:#111113;border:1px solid #2A2A30;border-radius:10px;padding:14px;transition:.2s}
.card:hover{border-color:#4F8EF7}
.card-title{font-size:14px;font-weight:600;color:#F0F0F2;margin-bottom:6px}
.card-url{font-size:11px;color:#4F8EF7;margin-bottom:8px;word-break:break-all;direction:ltr;text-align:left}
.card-desc{font-size:12px;color:#9090A0;line-height:1.6;margin-bottom:10px}
.card-btn{width:100%;padding:8px;background:#4F8EF7;border:none;color:#fff;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.empty{text-align:center;padding:4rem;color:#5A5A68}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>بحث الموردين <span>الأوروبيين</span></h1>
<p class="sub">نتائج حقيقية من Google — Europages · Kompass · Go4WorldBusiness</p>

<div class="search-row">
  <input type="text" id="q" placeholder="اكتب اسم المنتج... مثال: office furniture, solar panels"/>
  <button id="btn" onclick="doSearch()">بحث ↗</button>
</div>

<div class="tags">
  <div class="tag" onclick="qs('office furniture Germany')">أثاث مكتبي</div>
  <div class="tag" onclick="qs('medical supplies Europe')">مستلزمات طبية</div>
  <div class="tag" onclick="qs('organic coffee Germany')">قهوة عضوية</div>
  <div class="tag" onclick="qs('clothing manufacturer Europe')">ملابس</div>
  <div class="tag" onclick="qs('solar panels Europe')">ألواح شمسية</div>
  <div class="tag" onclick="qs('cosmetics manufacturer France')">تجميل</div>
  <div class="tag" onclick="qs('food wholesale Europe')">غذاء</div>
  <div class="tag" onclick="qs('packaging materials Germany')">تغليف</div>
</div>

<div id="status" style="display:none" class="status">جاري البحث...</div>
<div id="results"><div class="empty">🏭<br/>ابحث عن أي منتج</div></div>

<script>
function qs(t){document.getElementById('q').value=t;doSearch()}

async function doSearch(){
  const q=document.getElementById('q').value.trim();
  if(!q) return;
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='جاري...';
  const st=document.getElementById('status');
  st.style.display='block';st.textContent='يبحث في Google عن موردين حقيقيين...';
  document.getElementById('results').innerHTML='';

  try{
    const r=await fetch('/api/search',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:q+' supplier manufacturer Europe'})
    });
    const data=await r.json();
    const results=data.results||[];
    
    st.textContent='تم العثور على '+results.length+' نتيجة حقيقية من Google ✅';
    
    if(!results.length){
      document.getElementById('results').innerHTML='<div class="empty">لا توجد نتائج — جرب كلمة أخرى</div>';
    } else {
      document.getElementById('results').innerHTML=`<div class="grid">${results.map(r=>`
        <div class="card">
          <div class="card-title">${r.title||'—'}</div>
          <div class="card-url">${r.link||''}</div>
          <div class="card-desc">${r.snippet||'—'}</div>
          <button class="card-btn" onclick="window.open('${(r.link||'').replace(/'/g,"\\'")}','_blank')">فتح المورد ↗</button>
        </div>`).join('')}</div>`;
    }
  }catch(err){
    st.textContent='خطأ: '+err.message;
    console.error(err);
  }
  btn.disabled=false;btn.textContent='بحث ↗';
}

document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
</script>
</body>
</html>
